<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Movie Library</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span>Categories</span>
        <button id="sidebarToggle" class="icon-btn" title="Collapse sidebar" aria-label="Collapse sidebar">&laquo;</button>
      </div>
      <nav id="categoryNav" class="category-nav"></nav>
      <form id="addCategoryForm" class="add-category-form">
        <input id="newCategoryInput" type="text" placeholder="New category…" disabled />
        <button type="submit" class="btn btn-small" disabled>+</button>
      </form>
    </aside>

    <div class="main">
      <header class="topbar">
        <button id="sidebarOpenBtn" class="icon-btn hidden" title="Show categories" aria-label="Show categories">&raquo;</button>
        <h1>🎬 Movie Library</h1>
        <div class="topbar-actions">
          <span id="status" class="status"></span>
          <button id="addBtn" class="btn btn-primary" disabled>+ Add Movie</button>
        </div>
      </header>

      <div class="toolbar">
        <input id="search" type="search" placeholder="Search by title, category, or subcategory…" disabled />
        <select id="sortBy" disabled>
          <option value="title">Sort: Title</option>
          <option value="year">Sort: Year</option>
          <option value="category">Sort: Category</option>
        </select>
      </div>

      <main id="empty" class="empty-state">
        <p>Couldn't load the movie library.</p>
        <p class="empty-sub">Check your connection and reload the page.</p>
      </main>

      <main id="grid" class="grid hidden"></main>
    </div>
  </div>

  <!-- Add/Edit modal -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <button type="button" id="modalCloseBtn" class="modal-close" aria-label="Close">&times;</button>
      <h2 id="modalTitle">Add Movie</h2>
      <form id="movieForm">
        <label>Title
          <input type="text" id="fieldTitle" required />
        </label>
        <label>Year
          <input type="number" id="fieldYear" min="1878" max="2100" />
        </label>
        <label>Category
          <input type="text" id="fieldCategory" list="categoryList" />
          <datalist id="categoryList"></datalist>
        </label>
        <label>Subcategory
          <input type="text" id="fieldSubcategory" list="subcategoryList" />
          <datalist id="subcategoryList"></datalist>
        </label>
        <label>Cover image URL
          <input type="url" id="fieldCover" placeholder="https://…" />
        </label>
        <div class="modal-actions">
          <button type="button" id="deleteBtn" class="btn btn-danger hidden">Delete</button>
          <div class="modal-actions-right">
            <button type="button" id="cancelBtn" class="btn">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Movie</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
